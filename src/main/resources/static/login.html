<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CarePulse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container navbar-inner">
        <a href="index.html" class="navbar-brand"><span class="brand-cross" aria-hidden="true">✚</span> CarePulse</a>
        <div class="navbar-actions">
            <a href="cart.html" class="cart-btn">🛒 Cart<span class="cart-badge">0</span></a>
        </div>
    </div>
</nav>

<main class="login-page" id="main-content">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-text"><span aria-hidden="true">✚</span> CarePulse</div>
            <p>Your Health, Delivered</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs" role="tablist" aria-label="Login or Register">
            <button class="auth-tab active" id="login-tab-btn" onclick="switchAuthTab('login')" role="tab" aria-selected="true" aria-controls="login-panel">Login</button>
            <button class="auth-tab" id="register-tab-btn" onclick="switchAuthTab('register')" role="tab" aria-selected="false" aria-controls="register-panel">Register</button>
        </div>

        <!-- Login Panel -->
        <div id="login-panel" role="tabpanel" aria-labelledby="login-tab-btn">
            <form id="login-form" novalidate>

                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" class="form-control" id="login-username" placeholder="Enter your username" autocomplete="username" required aria-required="true">
                    <div class="form-error" id="login-username-error"></div>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-input-wrap">
                        <input type="password" class="form-control" id="login-password" placeholder="Enter your password" autocomplete="current-password" required aria-required="true">
                        <button type="button" class="show-password-btn" id="login-pw-toggle" aria-label="Toggle password visibility">👁️</button>
                    </div>
                    <div class="form-error" id="login-password-error"></div>
                </div>

                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember-me">
                        <label for="remember-me">Remember me</label>
                    </div>
                    <button type="button" class="filter-clear-btn" onclick="showForgotModal()">Forgot password?</button>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-submit-btn">Login</button>
            </form>

            <div style="text-align:center;margin-top:16px;font-size:14px;color:var(--text-secondary)">
                Don't have an account? <button class="filter-clear-btn" onclick="switchAuthTab('register')">Register here</button>
            </div>
        </div>

        <!-- Register Panel -->
        <div id="register-panel" style="display:none" role="tabpanel" aria-labelledby="register-tab-btn">
            <form id="register-form" novalidate>

                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-fullname">Full Name <span style="color:var(--error)">*</span></label>
                        <input type="text" class="form-control" id="reg-fullname" placeholder="Priya Perera" autocomplete="name" required>
                        <div class="form-error" id="reg-fullname-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="reg-username">Username <span style="color:var(--error)">*</span></label>
                        <input type="text" class="form-control" id="reg-username" placeholder="priyaperera" autocomplete="username" required>
                        <div class="form-error" id="reg-username-error"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reg-email">Email Address <span style="color:var(--error)">*</span></label>
                    <input type="email" class="form-control" id="reg-email" placeholder="priya@email.com" autocomplete="email" required>
                    <div class="form-error" id="reg-email-error"></div>
                </div>

                <div class="form-group">
                    <label for="reg-phone">Phone Number</label>
                    <input type="tel" class="form-control" id="reg-phone" placeholder="077 123 4567" autocomplete="tel">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-password">Password <span style="color:var(--error)">*</span></label>
                        <div class="password-input-wrap">
                            <input type="password" class="form-control" id="reg-password" placeholder="Min. 6 characters" autocomplete="new-password" required>
                            <button type="button" class="show-password-btn" onclick="togglePw('reg-password', this)" aria-label="Toggle password">👁️</button>
                        </div>
                        <div class="form-error" id="reg-password-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm-password">Confirm Password <span style="color:var(--error)">*</span></label>
                        <div class="password-input-wrap">
                            <input type="password" class="form-control" id="reg-confirm-password" placeholder="Re-enter password" autocomplete="new-password" required>
                            <button type="button" class="show-password-btn" onclick="togglePw('reg-confirm-password', this)" aria-label="Toggle password">👁️</button>
                        </div>
                        <div class="form-error" id="reg-confirm-error"></div>
                    </div>
                </div>

                <div class="checkbox-group" style="margin-bottom:20px">
                    <input type="checkbox" id="reg-terms" required>
                    <label for="reg-terms">I agree to the <a href="#" onclick="return false">Terms of Service</a> and <a href="#" onclick="return false">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" id="register-submit-btn">Create Account</button>
            </form>

            <div style="text-align:center;margin-top:16px;font-size:14px;color:var(--text-secondary)">
                Already have an account? <button class="filter-clear-btn" onclick="switchAuthTab('login')">Login here</button>
            </div>
        </div>

    </div>
</main>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="forgot-modal" role="dialog" aria-modal="true" aria-labelledby="forgot-title">
    <div class="modal">
        <div class="modal-header">
            <h3 id="forgot-title">Forgot Password</h3>
            <button class="modal-close" onclick="document.getElementById('forgot-modal').classList.remove('open')" aria-label="Close">×</button>
        </div>
        <div class="modal-body">
            <div id="forgot-content">
                <p class="text-secondary" style="margin-bottom:16px">Enter your email address and we'll send you a reset link.</p>
                <div class="form-group">
                    <label for="forgot-email">Email Address</label>
                    <input type="email" class="form-control" id="forgot-email" placeholder="priya@email.com">
                </div>
                <button class="btn btn-primary btn-full" onclick="sendResetLink()">Send Reset Link</button>
            </div>
            <div id="forgot-success" style="display:none;text-align:center;padding:16px 0">
                <div style="font-size:40px;margin-bottom:12px">📧</div>
                <h4>Reset link sent!</h4>
                <p class="text-secondary" style="margin-top:8px">Check your inbox for the password reset link. It expires in 30 minutes.</p>
            </div>
        </div>
    </div>
</div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script>
    // Redirect if already logged in
    document.addEventListener('DOMContentLoaded', () => {
        const user = getCurrentUser();
        if (user) {
            const redirect = getQueryParam('redirect');
            window.location.href = redirect || (user.role === 'ADMIN' ? 'admin.html' : 'index.html');
        }
    });

    function switchAuthTab(tab) {
        const loginBtn = document.getElementById('login-tab-btn');
        const registerBtn = document.getElementById('register-tab-btn');
        const loginPanel = document.getElementById('login-panel');
        const registerPanel = document.getElementById('register-panel');

        if (tab === 'login') {
            loginBtn.classList.add('active'); loginBtn.setAttribute('aria-selected', 'true');
            registerBtn.classList.remove('active'); registerBtn.setAttribute('aria-selected', 'false');
            loginPanel.style.display = 'block';
            registerPanel.style.display = 'none';
        } else {
            registerBtn.classList.add('active'); registerBtn.setAttribute('aria-selected', 'true');
            loginBtn.classList.remove('active'); loginBtn.setAttribute('aria-selected', 'false');
            registerPanel.style.display = 'block';
            loginPanel.style.display = 'none';
        }
    }

    function togglePw(inputId, btn) {
        const input = document.getElementById(inputId);
        if (!input) return;
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    }

    // Login Form
    document.getElementById('login-pw-toggle').onclick = () => togglePw('login-password', document.getElementById('login-pw-toggle'));

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;

        // Clear errors
        ['login-username-error', 'login-password-error'].forEach(id => {
            const el = document.getElementById(id);
            if (el) { el.textContent = ''; el.classList.remove('visible'); }
        });

        if (!username) {
            const errEl = document.getElementById('login-username-error');
            if (errEl) { errEl.textContent = 'Username is required'; errEl.classList.add('visible'); }
            document.getElementById('login-username').classList.add('error');
            return;
        }
        if (!password) {
            const errEl = document.getElementById('login-password-error');
            if (errEl) { errEl.textContent = 'Password is required'; errEl.classList.add('visible'); }
            document.getElementById('login-password').classList.add('error');
            return;
        }

        const btn = document.getElementById('login-submit-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px"></span> Logging in…';

        try {
            const user = await login(username, password);
            showToast(`Welcome back, ${user.fullName || user.username}! 👋`, 'success');

            const redirect = getQueryParam('redirect');
            setTimeout(() => {
                window.location.href = redirect || (user.role === 'ADMIN' ? 'admin.html' : 'index.html');
            }, 800);
        } catch (err) {
            const errEl = document.getElementById('login-password-error');
            if (errEl) { errEl.textContent = err.message || 'Invalid username or password'; errEl.classList.add('visible'); }
            document.getElementById('login-password').classList.add('error');
            showToast('Login failed: ' + (err.message || 'Invalid credentials'), 'error');
            btn.disabled = false;
            btn.textContent = 'Login';
        }
    });

    // Register Form
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        let valid = true;

        const clearErr = (errId, inputId) => {
            const errEl = document.getElementById(errId);
            const inputEl = document.getElementById(inputId);
            if (errEl) { errEl.textContent = ''; errEl.classList.remove('visible'); }
            if (inputEl) inputEl.classList.remove('error');
        };

        const showErr = (errId, inputId, msg) => {
            const errEl = document.getElementById(errId);
            const inputEl = document.getElementById(inputId);
            if (errEl) { errEl.textContent = msg; errEl.classList.add('visible'); }
            if (inputEl) inputEl.classList.add('error');
            valid = false;
        };

        ['reg-fullname', 'reg-username', 'reg-email', 'reg-password'].forEach(id => clearErr(id + '-error', id));

        const fullName = document.getElementById('reg-fullname').value.trim();
        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirmPassword = document.getElementById('reg-confirm-password').value;
        const termsChecked = document.getElementById('reg-terms').checked;

        if (!fullName) showErr('reg-fullname-error', 'reg-fullname', 'Full name is required');
        if (!username || username.length < 3) showErr('reg-username-error', 'reg-username', 'Username must be at least 3 characters');
        if (!email || !isValidEmail(email)) showErr('reg-email-error', 'reg-email', 'Please enter a valid email address');
        if (!isValidPassword(password)) showErr('reg-password-error', 'reg-password', 'Password must be at least 6 characters');
        if (password !== confirmPassword) showErr('reg-confirm-error', 'reg-confirm-password', 'Passwords do not match');
        if (!termsChecked) { showToast('Please accept the Terms of Service', 'warning'); valid = false; }

        if (!valid) return;

        const btn = document.getElementById('register-submit-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px"></span> Creating account…';

        try {
            const user = await register({ fullName, username, email, phone, password });
            showToast(`Account created! Welcome, ${user.fullName}! 🎉`, 'success');
            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        } catch (err) {
            showToast('Registration failed: ' + (err.message || 'Please try again'), 'error');
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    });

    // Real-time validation
    document.getElementById('reg-email').addEventListener('blur', (e) => {
        if (e.target.value && !isValidEmail(e.target.value)) {
            const err = document.getElementById('reg-email-error');
            if (err) { err.textContent = 'Invalid email format'; err.classList.add('visible'); }
            e.target.classList.add('error');
        }
    });

    document.getElementById('reg-password').addEventListener('input', (e) => {
        const err = document.getElementById('reg-password-error');
        if (e.target.value && e.target.value.length < 6) {
            if (err) { err.textContent = 'Min. 6 characters'; err.classList.add('visible'); }
            e.target.classList.add('error');
        } else {
            if (err) { err.textContent = ''; err.classList.remove('visible'); }
            e.target.classList.remove('error');
        }
    });

    // Forgot password
    function showForgotModal() {
        document.getElementById('forgot-content').style.display = 'block';
        document.getElementById('forgot-success').style.display = 'none';
        document.getElementById('forgot-modal').classList.add('open');
    }

    function sendResetLink() {
        const email = document.getElementById('forgot-email').value.trim();
        if (!email || !isValidEmail(email)) { showToast('Please enter a valid email address', 'warning'); return; }
        setTimeout(() => {
            document.getElementById('forgot-content').style.display = 'none';
            document.getElementById('forgot-success').style.display = 'block';
        }, 800);
    }

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('open'); });
    });

    // Check URL tab param
    document.addEventListener('DOMContentLoaded', () => {
        if (getQueryParam('tab') === 'register') switchAuthTab('register');
    });
</script>
</body>
</html>
