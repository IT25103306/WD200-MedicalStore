<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — CarePulse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container navbar-inner">
        <a href="index.html" class="navbar-brand"><span class="brand-cross" aria-hidden="true">✚</span> CarePulse</a>
        <div class="navbar-nav" role="list">
            <a href="index.html" class="nav-link" role="listitem">Home</a>
            <a href="products.html" class="nav-link" role="listitem">Shop</a>
            <a href="orders.html" class="nav-link active" role="listitem">Orders</a>
            <a href="prescriptions.html" class="nav-link" role="listitem">Prescriptions</a>
        </div>
        <div class="navbar-actions">
            <a href="cart.html" class="cart-btn">🛒 Cart<span class="cart-badge">0</span></a>
            <div id="navbar-auth"></div>
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
        </div>
    </div>
    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="products.html" class="nav-link">Shop</a>
        <a href="orders.html" class="nav-link active">Orders</a>
        <a href="prescriptions.html" class="nav-link">Prescriptions</a>
        <a href="cart.html" class="nav-link">🛒 Cart</a>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <h1>My Orders</h1>
        <p>Track and manage your medicine orders</p>
    </div>
</div>

<main class="orders-page" id="main-content">
    <div class="container">

        <!-- Status Filter Tabs -->
        <div class="status-tabs" role="tablist" aria-label="Filter orders by status">
            <button class="status-tab-btn active" data-status="All" role="tab" aria-selected="true">All</button>
            <button class="status-tab-btn" data-status="PENDING" role="tab" aria-selected="false">Pending</button>
            <button class="status-tab-btn" data-status="CONFIRMED" role="tab" aria-selected="false">Confirmed</button>
            <button class="status-tab-btn" data-status="PROCESSING" role="tab" aria-selected="false">Processing</button>
            <button class="status-tab-btn" data-status="SHIPPED" role="tab" aria-selected="false">Shipped</button>
            <button class="status-tab-btn" data-status="DELIVERED" role="tab" aria-selected="false">Delivered</button>
            <button class="status-tab-btn" data-status="CANCELLED" role="tab" aria-selected="false">Cancelled</button>
        </div>

        <!-- Orders List -->
        <div id="orders-list" aria-live="polite">
            <div style="text-align:center;padding:64px">
                <div class="spinner" style="margin:auto;width:36px;height:36px;border-width:3px"></div>
                <p class="text-secondary" style="margin-top:16px">Loading your orders…</p>
            </div>
        </div>

    </div>
</main>

<footer class="footer" role="contentinfo">
    <div class="container">
        <div class="footer-bottom" style="border-top:none;padding-top:0">
            <div class="footer-brand"><span aria-hidden="true">✚</span> CarePulse</div>
            <span style="color:rgba(255,255,255,0.5)">© 2025 CarePulse. All rights reserved.</span>
        </div>
    </div>
</footer>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', initOrdersPage);
</script>
</body>
</html>
